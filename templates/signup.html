{% extends "base.html" %}

{% block extra_css %}
<style>
    .auth-container {
        max-width: 400px;
        margin: 40px auto;
        padding: 30px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .auth-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .auth-header h2 {
        color: #333;
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 8px;
    }

    .auth-header p {
        color: #666;
        font-size: 14px;
    }

    .input-group {
        margin-bottom: 20px;
    }

    .input-group label {
        display: block;
        color: #555;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 8px;
    }

    .input-group input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #eef2f6;
        border-radius: 12px;
        font-size: 15px;
        transition: all 0.2s ease;
        font-family: 'Inter', sans-serif;
    }

    .input-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .auth-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 10px;
    }

    .auth-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .auth-link {
        text-align: center;
        margin-top: 20px;
        color: #666;
        font-size: 14px;
    }

    .auth-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
    }

    .auth-link a:hover {
        text-decoration: underline;
    }

    .message {
        padding: 12px;
        border-radius: 8px;
        margin-top: 20px;
        font-size: 14px;
        display: none;
    }

    .message.error {
        display: block;
        background: #ffebee;
        color: #f44336;
        border: 1px solid #ffcdd2;
    }

    .message.success {
        display: block;
        background: #e8f5e9;
        color: #4CAF50;
        border: 1px solid #c8e6c9;
    }

    .password-strength {
        margin-top: 8px;
        font-size: 12px;
    }

    .strength-weak { color: #f44336; }
    .strength-medium { color: #FF9800; }
    .strength-strong { color: #4CAF50; }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-header">
        <h2>✨ Create Account</h2>
        <p>Start your pronunciation improvement journey</p>
    </div>

    <div class="input-group">
        <label>Username</label>
        <input id="username" type="text" placeholder="Choose a username" autocomplete="off">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input id="password" type="password" placeholder="Create a password">
        <div id="passwordStrength" class="password-strength"></div>
    </div>

    <div class="input-group">
        <label>Confirm Password</label>
        <input id="confirm_password" type="password" placeholder="Confirm your password">
    </div>

    <button onclick="signup()" class="auth-btn">
        <span style="margin-right: 8px;">🚀</span> Sign Up
    </button>

    <div id="message" class="message"></div>

    <div class="auth-link">
        Already have an account? <a href="/">Login here</a>
    </div>
</div>

<script>
// Password strength checker
document.getElementById("password").addEventListener("input", function() {
    const password = this.value;
    const strengthEl = document.getElementById("passwordStrength");
    
    if (password.length === 0) {
        strengthEl.innerHTML = "";
        return;
    }
    
    let strength = 0;
    if (password.length >= 8) strength++;
    if (password.match(/[a-z]+/)) strength++;
    if (password.match(/[A-Z]+/)) strength++;
    if (password.match(/[0-9]+/)) strength++;
    if (password.match(/[$@#&!]+/)) strength++;
    
    let strengthText = "";
    let strengthClass = "";
    
    if (strength < 2) {
        strengthText = "Weak password";
        strengthClass = "strength-weak";
    } else if (strength < 4) {
        strengthText = "Medium password";
        strengthClass = "strength-medium";
    } else {
        strengthText = "Strong password";
        strengthClass = "strength-strong";
    }
    
    strengthEl.innerHTML = `Strength: <span class="${strengthClass}">${strengthText}</span>`;
});

async function signup() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirm_password").value;
    const messageEl = document.getElementById("message");
    
    if (!username || !password) {
        messageEl.className = "message error";
        messageEl.innerText = "Please enter username and password";
        return;
    }
    
    if (username.length < 3) {
        messageEl.className = "message error";
        messageEl.innerText = "Username must be at least 3 characters";
        return;
    }
    
    if (password.length < 6) {
        messageEl.className = "message error";
        messageEl.innerText = "Password must be at least 6 characters";
        return;
    }
    
    if (password !== confirmPassword) {
        messageEl.className = "message error";
        messageEl.innerText = "Passwords do not match";
        return;
    }
    
    try {
        const res = await fetch("/auth/signup", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                username: username,
                password: password
            })
        });

        const data = await res.json();
        
        if (res.ok) {
            messageEl.className = "message success";
            messageEl.innerText = "Account created successfully! Redirecting to login...";
            setTimeout(() => {
                window.location.href = "/";
            }, 2000);
        } else {
            messageEl.className = "message error";
            messageEl.innerText = data.msg || "Username already exists";
        }
    } catch (error) {
        console.error("Signup error:", error);
        messageEl.className = "message error";
        messageEl.innerText = "Unable to connect to server";
    }
}
</script>
{% endblock %}
