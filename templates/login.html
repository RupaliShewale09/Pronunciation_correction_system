{% extends "base.html" %}

{% block extra_css %}
<style>
    .auth-container {
        max-width: 400px;
        margin: 40px auto;
        padding: 30px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .auth-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .auth-header h2 {
        color: #333;
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 8px;
    }

    .auth-header p {
        color: #666;
        font-size: 14px;
    }

    .input-group {
        margin-bottom: 20px;
    }

    .input-group label {
        display: block;
        color: #555;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 8px;
    }

    .input-group input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #eef2f6;
        border-radius: 12px;
        font-size: 15px;
        transition: all 0.2s ease;
        font-family: 'Inter', sans-serif;
    }

    .input-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .auth-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 10px;
    }

    .auth-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .auth-link {
        text-align: center;
        margin-top: 20px;
        color: #666;
        font-size: 14px;
    }

    .auth-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
    }

    .auth-link a:hover {
        text-decoration: underline;
    }

    .message {
        padding: 12px;
        border-radius: 8px;
        margin-top: 20px;
        font-size: 14px;
        display: none;
    }

    .message.error {
        display: block;
        background: #ffebee;
        color: #f44336;
        border: 1px solid #ffcdd2;
    }

    .message.success {
        display: block;
        background: #e8f5e9;
        color: #4CAF50;
        border: 1px solid #c8e6c9;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-header">
        <h2>👋 Welcome Back</h2>
        <p>Login to continue your pronunciation journey</p>
    </div>

    <div class="input-group">
        <label>Username</label>
        <input id="username" type="text" placeholder="Enter your username" autocomplete="off">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input id="password" type="password" placeholder="Enter your password">
    </div>

    <button onclick="login()" class="auth-btn">
        <span style="margin-right: 8px;">🔐</span> Login
    </button>

    <div id="message" class="message"></div>

    <div class="auth-link">
        Don't have an account? <a href="/signup">Create account</a>
    </div>
</div>

<script>
async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const messageEl = document.getElementById("message");
    
    if (!username || !password) {
        messageEl.className = "message error";
        messageEl.innerText = "Please enter both username and password";
        return;
    }
    
    try {
        const res = await fetch("/auth/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                username: username,
                password: password
            })
        });

        const data = await res.json();
        
        if (res.ok && data.access_token) {
            messageEl.className = "message success";
            messageEl.innerText = "Login successful! Redirecting...";
            localStorage.setItem("token", data.access_token);
            setTimeout(() => {
                window.location.href = "/dashboard";
            }, 1000);
        } else {
            messageEl.className = "message error";
            messageEl.innerText = data.msg || "Invalid username or password";
        }
    } catch (error) {
        console.error("Login error:", error);
        messageEl.className = "message error";
        messageEl.innerText = "Unable to connect to server";
    }
}

// Redirect if already logged in
if (localStorage.getItem("token")) {
    window.location.href = "/dashboard";
}
</script>
{% endblock %}
